name: Build Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        branch:
          - android13-5.15-sukisu-susfs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone kernel repository
        run: |
          git clone --depth=1 --single-branch --branch ${{ matrix.branch }} https://github.com/nrmu9/kernel_samsung_sm8550-common.git

      - name: Cache kernel build
        uses: actions/cache@v4
        with:
          path: |
            kernel_samsung_sm8550-common/out
            kernel_samsung_sm8550-common/.ccache
          key: ${{ runner.os }}-kernel-${{ matrix.branch }}-${{ hashFiles('kernel_samsung_sm8550-common/build.config*', 'kernel_samsung_sm8550-common/Makefile', 'kernel_samsung_sm8550-common/arch/arm64/configs/**', 'kernel_samsung_sm8550-common/scripts/build.sh') }}
          restore-keys: |
            ${{ runner.os }}-kernel-${{ matrix.branch }}-
            ${{ runner.os }}-kernel-

      - name: Set timezone
        run: sudo timedatectl set-timezone Europe/Warsaw
        continue-on-error: true

      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt upgrade -y
          sudo apt install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git git-lfs gnupg \
            gperf imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc zip zlib1g-dev \
            openjdk-11-jdk pahole dwarves cpio python3 \
            python-is-python3 tar perl wget lz4 make

      - name: Setup swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Download AnyKernel3 zip and patch_linux
        run: |
          wget -q https://github.com/nrmu9/kernel_samsung_sm8550-common/releases/download/AnyKernel3/AnyKernel3.zip
          # patch_linux is the Linux runner binary we need.
          # Prefer the GitHub "latest" release, fallback to a known version.
          set -euo pipefail
          PATCH_RELEASE_BASE="https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases"

          if ! curl -fL -o patch_linux "$PATCH_RELEASE_BASE/latest/download/patch_linux"; then
            curl -fL -o patch_linux "$PATCH_RELEASE_BASE/download/0.12.5/patch_linux"
          fi

          chmod +x patch_linux
          echo "PATCH_LINUX=$GITHUB_WORKSPACE/patch_linux" >> $GITHUB_ENV

      - name: Build kernel
        run: |
          cd kernel_samsung_sm8550-common
          git submodule update --init --recursive
          git config user.name "nigger"
          git config user.email "nigger@nigger.sex"
          
          # Setup ccache for faster compilation
          export USE_CCACHE=1
          export CCACHE_DIR=$(pwd)/.ccache
          ccache -M 2G

          export KBUILD_BUILD_HOST=nrmu
          export KBUILD_BUILD_USER=nrmu9
          
          KERNEL_VERSION=$(make kernelversion | awk '/^[0-9]/ {print $1}' | tr -d '()')
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          # Determine KernelSU commit count (last page from commits API)
          KSU_VERSION_GITHUB=$(curl -sI "https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p' || true)
          echo "KSU_VERSION_GITHUB=$KSU_VERSION_GITHUB" >> $GITHUB_ENV
          # Match Makefile logic: KSU_VERSION := expr 40000 + <commit_count> - 2815
          if [ -n "$KSU_VERSION_GITHUB" ]; then
            KSU_VERSION=$(expr $KSU_VERSION_GITHUB + 37185)
          else
            # fallback if we couldn't fetch the online count
            KSU_VERSION=13000
          fi
          KSU_VERSION=$(echo "$KSU_VERSION" | tr -d '()')
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          
          echo "Building kernel..."
          ./scripts/build.sh

      - name: Package the kernel
        run: |
          unzip AnyKernel3.zip -d AnyKernel3/
          cp kernel_samsung_sm8550-common/out/arch/arm64/boot/Image.gz AnyKernel3/
          echo "=== AnyKernel3 contents ==="
          ls -la AnyKernel3/

      - name: Create KPM-patched kernel
        run: |
          set -e
          TEMP_DIR=$(mktemp -d)
          
          echo "[*] Working in temp directory: $TEMP_DIR"
          
          # Copy Image.gz to temp dir
          cp AnyKernel3/Image.gz "$TEMP_DIR/"
          
          # Decompress Image.gz to Image
          echo "[*] Decompressing Image.gz..."
          gunzip -k "$TEMP_DIR/Image.gz"
          
          # Run patch_linux on Image
          echo "[*] Running patch_linux..."
          cd "$TEMP_DIR"
          "${PATCH_LINUX:-$GITHUB_WORKSPACE/patch_linux}" Image
          
          # Replace Image with patched oImage
          echo "[*] Replacing Image with patched oImage..."
          rm Image
          mv oImage Image
          
          # Compress Image back to Image.gz
          echo "[*] Compressing Image to Image.gz..."
          rm Image.gz
          gzip -k Image
          
          # Create KPM AnyKernel3 directory
          cd "$GITHUB_WORKSPACE"
          cp -r AnyKernel3 AnyKernel3-kpm
          cp "$TEMP_DIR/Image.gz" AnyKernel3-kpm/
          
          echo "=== AnyKernel3-kpm contents ==="
          ls -la AnyKernel3-kpm/
          
          # Cleanup
          rm -rf "$TEMP_DIR"
          echo "[+] KPM patching done!"

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: common-${{ env.KERNEL_VERSION }}-sukisu${{ env.KSU_VERSION }}-full
          path: AnyKernel3/*

      - name: Upload KPM-patched kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: common-${{ env.KERNEL_VERSION }}-sukisu${{ env.KSU_VERSION }}-kpm-full
          path: AnyKernel3-kpm/*